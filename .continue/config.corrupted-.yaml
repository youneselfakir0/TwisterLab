name: TwisterLab
version: "1.0.2"
schema: v1

models:
  - name: Qwen 3 (8B) - Chat & Agent
    provider: ollama
    model: qwen3:8b
    apiBase: http://192.168.0.20:11434
    roles:
      - chat

  - name: DeepSeek R1 - Reasoning & Edit
    provider: ollama
    model: deepseek-r1:latest
    apiBase: http://192.168.0.20:11434
    roles:
      - edit

  - name: Llama 3.2 (1B)
    provider: ollama
    model: llama3.2:1b
    apiBase: http://192.168.0.20:11434

  - name: Llama 3 (8B)
    provider: ollama
    model: llama3:latest
    apiBase: http://192.168.0.20:11434

  - name: Qwen 3 VL - Multimodal
    provider: ollama
    model: qwen3-vl:latest
    apiBase: http://192.168.0.20:11434

  - name: CodeLlama Autocomplete
    provider: ollama
    model: codellama:latest
    apiBase: http://192.168.0.20:11434
    roles:
      - autocomplete

context:
  - provider: code
  - provider: diff
  - provider: terminal

mcpServers:
  - name: TwisterLab MCP
    command: python
    args:
      - agents/mcp/mcp_server_continue_sync.py
    env:
      PYTHONPATH: C:\TwisterLab
      API_URL: http://192.168.0.30:8000