# Configuration Continue.dev pour TwisterLab v1.0.1 (edgeserver Linux)
# Documentation: https://docs.continue.dev/reference

name: "TwisterLab Assistant"
version: "1.0.1"
schema: "v1"

# Modèles Ollama sur CoreServer (192.168.0.20:11434)
# Note: edgeserver utilise l'instance Ollama de CoreServer
models:
  # === MODÈLES LOCAUX OLLAMA (CoreServer) ===
  
  - name: "Llama 3.2 (1B) - Chat Rapide"
    provider: "ollama"
    model: "llama3.2:1b"
    apiBase: "http://192.168.0.20:11434"
    roles:
      - chat
      - edit
    defaultCompletionOptions:
      temperature: 0.7
      maxTokens: 2048

  - name: "Llama 3 (8B) - Chat Avancé"
    provider: "ollama"
    model: "llama3:latest"
    apiBase: "http://192.168.0.20:11434"
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.7
      maxTokens: 4096

  - name: "DeepSeek R1 - Raisonnement Complexe"
    provider: "ollama"
    model: "deepseek-r1:latest"
    apiBase: "http://192.168.0.20:11434"
    roles:
      - chat
    defaultCompletionOptions:
      temperature: 0.7
      maxTokens: 4096
      reasoning: true

  - name: "CodeLlama - Génération Code"
    provider: "ollama"
    model: "codellama:latest"
    apiBase: "http://192.168.0.20:11434"
    roles:
      - chat
      - edit
      - autocomplete
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 2048
    autocompleteOptions:
      debounceDelay: 300
      maxPromptTokens: 1024
      onlyMyCode: true

  - name: "Qwen 3 (8B) - Refactoring Expert"
    provider: "ollama"
    model: "qwen3:8b"
    apiBase: "http://192.168.0.20:11434"
    roles:
      - chat
      - edit
      - apply
    defaultCompletionOptions:
      temperature: 0.5
      maxTokens: 8192

  # === API OLLAMA CLOUD (GRATUIT) ===
  - name: "GPT-OSS (120B) - Cloud Gratuit"
    provider: "ollama"
    model: "gpt-oss:120b-cloud"
    apiBase: "http://192.168.0.20:11434"
    roles:
      - chat
      - edit
    defaultCompletionOptions:
      temperature: 0.7
      maxTokens: 8192

# MCP Servers - TwisterLab Agents Integration (edgeserver local)
mcpServers:
  - name: "TwisterLab MCP"
    command: "python3"
    args:
      - "/home/twister/TwisterLab/agents/mcp/mcp_server_continue_sync.py"
    env:
      API_URL: "http://localhost:8000"
      PYTHONPATH: "/home/twister/TwisterLab"
    cwd: "/home/twister/TwisterLab"
    connectionTimeout: 10000

# Context providers
context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal

# Custom rules pour TwisterLab
rules:
  - "Utiliser DeepSeek R1 pour analyses complexes et raisonnement profond"
  - "Utiliser Llama 3.2 (1B) pour chat rapide et simple"
  - "Utiliser Llama 3 (8B) pour conversations avancées"
  - "Utiliser CodeLlama pour génération et autocomplétion code"
  - "Utiliser Qwen 3 (8B) pour refactoring et optimisation code"
  - "Utiliser GPT-OSS (120B) pour tâches très complexes nécessitant modèle large"
  - "Ollama tourne sur CoreServer (192.168.0.20:11434)"
  - "API TwisterLab locale sur edgeserver (http://localhost:8000)"
  - "Tous les modèles Ollama sont 100% gratuits"
  - "MCP TwisterLab donne accès aux 7 agents autonomes"
  - "Valider avec pytest avant commit"
  - "Suivre patterns TwisterAgent pour nouveaux agents"
  - "Utiliser @mcp pour appeler agents TwisterLab depuis Continue"
  - "Python sur edgeserver: python3 (pas python)"
