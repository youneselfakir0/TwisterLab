# Configuration Continue.dev pour TwisterLab (edgeserver)
name: "TwisterLab Assistant"
version: "1.0.0"
schema: "v1"

models:
  - name: "TwisterLab Llama 3.2"
    provider: "ollama"
    model: "llama3.2:1b"
    apiBase: "http://192.168.0.20:11434"
    defaultCompletionOptions:
      temperature: 0.7
      maxTokens: 2048

  - name: "TwisterLab DeepSeek R1"
    provider: "ollama"
    model: "deepseek-r1"
    apiBase: "http://192.168.0.20:11434"
    defaultCompletionOptions:
      temperature: 0.7
      maxTokens: 4096

mcpServers:
  - name: "twisterlab-mcp"
    command: "python3"
    args: ["/home/twister/TwisterLab/agents/mcp/mcp_server_continue_sync.py"]
    cwd: "/home/twister/TwisterLab"
    env:
      PYTHONPATH: "/home/twister/TwisterLab"
      API_URL: "http://localhost:8000"

rules:
  - "Utiliser llama3.2:1b pour les tâches rapides"
  - "Utiliser deepseek-r1 pour les analyses complexes"
  - "Toujours valider avec les tests pytest"
  - "Suivre les patterns TwisterAgent pour les nouveaux agents"
