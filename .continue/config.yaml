# Configuration Continue.dev pour TwisterLab
# Documentation: https://docs.continue.dev/reference

name: "TwisterLab Assistant"
version: "1.0.0"
schema: "v1"

# Modèles Ollama locaux (gratuits)
# https://docs.continue.dev/customization/models
models:
  - name: "Ollama Llama 3.2 (Local)"
    provider: "ollama"
    model: "llama3.2:1b"
    apiBase: "http://localhost:11434"
    defaultCompletionOptions:
      temperature: 0.7
      maxTokens: 2048

  - name: "Ollama DeepSeek R1 (Local)"
    provider: "ollama"
    model: "deepseek-r1"
    apiBase: "http://localhost:11434"
    defaultCompletionOptions:
      temperature: 0.7
      maxTokens: 4096

  - name: "Ollama CodeLlama (Local)"
    provider: "ollama"
    model: "codellama"
    apiBase: "http://localhost:11434"
    defaultCompletionOptions:
      temperature: 0.3
      maxTokens: 2048

  - name: "Ollama Qwen 2.5 Coder (Local)"
    provider: "ollama"
    model: "qwen2.5-coder"
    apiBase: "http://localhost:11434"
    defaultCompletionOptions:
      temperature: 0.5
      maxTokens: 8192

# NOTE: MCP servers pas encore configurés - Continue utilise seulement Ollama local pour l'instant
# Pour ajouter MCP TwisterLab plus tard, voir .continue/README_TwisterLab_MCP.md

# Custom rules pour TwisterLab
rules:
  - "Utiliser DeepSeek R1 pour analyses complexes et raisonnement"
  - "Utiliser Llama 3.2 pour tâches rapides et chat"
  - "Utiliser CodeLlama pour génération de code"
  - "Utiliser Qwen 2.5 Coder pour refactoring et optimisation"
  - "GitHub Copilot disponible dans VS Code (Claude 3.5 Sonnet)"
  - "Claude Desktop Free disponible séparément"
  - "Tous les modèles Ollama sont gratuits et locaux"
  - "Valider avec pytest avant commit"
  - "Suivre patterns TwisterAgent pour nouveaux agents"
