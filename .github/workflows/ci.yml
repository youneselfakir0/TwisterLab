name: CI - Tests & Quality Gates

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Linting & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pylint mypy black isort
          pip install -e .
      
      - name: Run Ruff (fast linting)
        run: ruff check agents/ tests/ cli/ --exit-zero
      
      - name: Run Black (code formatting)
        run: black --check --diff agents/ tests/ cli/
        continue-on-error: true
      
      - name: Run isort (import sorting)
        run: isort --check-only --diff agents/ tests/ cli/
        continue-on-error: true
      
      - name: Run Pylint
        run: pylint agents/ --rcfile=.pylintrc --exit-zero
      
      - name: Run MyPy (type checking)
        run: mypy agents/ --strict --ignore-missing-imports
        continue-on-error: true

  test:
    name: Unit Tests (Coverage ≥80%)
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: twisterlab
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: twisterlab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -e .
      
      - name: Run unit tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://twisterlab:test_password@localhost:5432/twisterlab_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ \
            -v \
            --cov=agents \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --tb=short \
            --junit-xml=pytest-report.xml
      
      - name: Check coverage threshold (≥80%)
        run: |
          coverage report --fail-under=80
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            pytest-report.xml
            htmlcov/

  integration-tests:
    name: Full Stack Integration Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install -e .
      
      - name: Run integration tests
        run: |
          pytest tests/test_integration_full_system.py \
            -v \
            -s \
            --tb=short

  quality-gate:
    name: Quality Gate Summary
    runs-on: ubuntu-latest
    needs: [lint, test, integration-tests]
    if: always()
    
    steps:
      - name: Check all jobs status
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "❌ Quality gate FAILED"
            exit 1
          else
            echo "✅ Quality gate PASSED"
          fi
