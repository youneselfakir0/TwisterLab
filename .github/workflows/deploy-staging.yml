name: Deploy to Staging

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-
            type=raw,value=staging-latest
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=staging-${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: https://staging.twisterlab.local:8001
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Create .env.staging
        run: |
          cat > .env.staging << EOF
          ENVIRONMENT=staging
          DEBUG=false
          LOG_LEVEL=INFO
          
          # Database
          DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}
          POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD }}
          
          # Redis
          REDIS_URL=${{ secrets.STAGING_REDIS_URL }}
          REDIS_PASSWORD=${{ secrets.STAGING_REDIS_PASSWORD }}
          
          # API
          API_HOST=0.0.0.0
          API_PORT=8000
          API_WORKERS=2
          SECRET_KEY=${{ secrets.STAGING_SECRET_KEY }}
          ALLOWED_ORIGINS=https://staging.twisterlab.local
          
          # Ollama
          OLLAMA_BASE_URL=http://ollama:11434
          OLLAMA_MODEL=deepseek-r1:latest
          
          # Monitoring
          ENABLE_METRICS=true
          METRICS_PORT=9090
          
          # Alert Thresholds
          ALERT_CPU_THRESHOLD=80.0
          ALERT_MEMORY_THRESHOLD=85.0
          ALERT_DISK_THRESHOLD=90.0
          ALERT_API_RESPONSE_TIME=2.0
          ALERT_ERROR_RATE=10.0
          EOF
      
      - name: Deploy with Docker Compose
        run: |
          docker-compose -f docker-compose.staging.yml down
          docker-compose -f docker-compose.staging.yml pull
          docker-compose -f docker-compose.staging.yml up -d
      
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for health checks..."
          timeout=120
          elapsed=0
          interval=5
          
          while [ $elapsed -lt $timeout ]; do
            if docker-compose -f docker-compose.staging.yml ps | grep -q "healthy"; then
              echo "Services are healthy after ${elapsed}s"
              break
            fi
            echo "Waiting... (${elapsed}s/${timeout}s)"
            sleep $interval
            elapsed=$((elapsed + interval))
          done
          
          if [ $elapsed -ge $timeout ]; then
            echo "Health check timeout - checking logs..."
            docker-compose -f docker-compose.staging.yml logs --tail=50
            exit 1
          fi
      
      - name: Pull Ollama models
        run: |
          docker exec twisterlab-ollama-staging ollama pull deepseek-r1
      
      - name: Run smoke tests
        run: |
          python tests/smoke_tests_staging.py
      
      - name: Get deployment info
        id: deploy_info
        run: |
          echo "deployment_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "commit_author=${{ github.actor }}" >> $GITHUB_OUTPUT
      
      - name: Create deployment summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # 🚀 Staging Deployment Successful
          
          ## Deployment Info
          - **Environment**: Staging
          - **Commit**: \`${{ github.sha }}\`
          - **Author**: ${{ github.actor }}
          - **Time**: ${{ steps.deploy_info.outputs.deployment_time }}
          - **Image**: \`${{ needs.build-and-push.outputs.image_tag }}\`
          - **Digest**: \`${{ needs.build-and-push.outputs.image_digest }}\`
          
          ## Access URLs
          - 📡 **API**: https://staging.twisterlab.local:8001
          - 📊 **API Docs**: https://staging.twisterlab.local:8001/docs
          - 🔍 **Prometheus**: https://staging.twisterlab.local:9092
          - 📊 **Grafana**: https://staging.twisterlab.local:3001
          
          ## Next Steps
          1. ✅ Verify API health: \`curl https://staging.twisterlab.local:8001/health\`
          2. ✅ Check Prometheus targets: https://staging.twisterlab.local:9092/targets
          3. ✅ Review Grafana dashboards
          4. ✅ Run integration tests: \`pytest tests/test_integration_full_system.py\`
          EOF
      
      - name: Notify deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const message = `${status} Staging deployment ${{ job.status }}
            
            **Commit**: \`${{ github.sha }}\`
            **Author**: ${{ github.actor }}
            **Time**: ${{ steps.deploy_info.outputs.deployment_time }}
            
            [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            // Create deployment comment on commit
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: message
            });

  rollback-on-failure:
    name: Rollback on Deployment Failure
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: failure()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: Execute rollback
        run: |
          python rollback_staging.py --keep-volumes
      
      - name: Notify rollback
        uses: actions/github-script@v7
        with:
          script: |
            const message = `🔄 **Staging Rollback Executed**
            
            Deployment failed and was automatically rolled back.
            
            **Commit**: \`${{ github.sha }}\`
            **Time**: \`$(date -u +'%Y-%m-%dT%H:%M:%SZ')\`
            
            [View failure logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: message
            });
