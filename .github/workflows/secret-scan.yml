name: Secret Scanning

on:
  push:
    branches: [main, snapshot-20251113-220208]
  pull_request:
    branches: [main]

jobs:
  gitleaks-scan:
    runs-on: ubuntu-latest
    name: Run Gitleaks secret scanner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Gitleaks action sometimes uses tags not mirrored by the runner image. Use custom ci scanner instead.
      - name: Run repo secret scan (custom policy)
        run: |
          python scripts/ci_secret_scan.py
