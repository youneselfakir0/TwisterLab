version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.prod
    volumes:
      # Mount source code for hot reload in development
      - ..:/app
      - /app/__pycache__
    environment:
      - DEBUG=true
      - RELOAD=true
    command: ["python", "-m", "uvicorn", "agents.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  postgres:
    ports:
      - "5432:5432"  # Expose PostgreSQL port for development tools

  redis:
    ports:
      - "6379:6379"  # Expose Redis port for development tools

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certificates for development
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
