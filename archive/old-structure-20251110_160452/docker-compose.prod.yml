version: '3.8'

services:
  # PostgreSQL Database - Production
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.prod
    ports:
      - "5433:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    configs:
      - source: postgres_init
        target: /docker-entrypoint-initdb.d/init.sql
    networks:
      - twisterlab_prod
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache & State - Production
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    env_file:
      - .env.prod
    ports:
      - "6380:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - twisterlab_prod
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # TwisterLab API Server - Production
  api:
    image: python:3.12-slim
    command: ["python", "-m", "uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env.prod
    environment:
      - ENVIRONMENT=production
    ports:
      - "8001:8000"
    volumes:
      - ./:/app:ro  # Lecture seule pour sécurité
      - ./logs:/app/logs
    working_dir: /app
    networks:
      - twisterlab_prod
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy - Production
  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
      - "8444:443"
    volumes:
      - nginx_logs:/var/log/nginx
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
      - source: nginx_ssl_key
        target: /etc/nginx/ssl/nginx.key
      - source: nginx_ssl_cert
        target: /etc/nginx/ssl/nginx.crt
    networks:
      - twisterlab_prod
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_prod_data:
    external: true
  redis_prod_data:
    external: true
  nginx_logs:
    external: true

networks:
  twisterlab_prod:
    external: true

configs:
  postgres_init:
    file: ./deployment/docker/init.sql
  nginx_config:
    file: ./deployment/nginx/nginx.conf
  nginx_ssl_key:
    file: ./deployment/nginx/ssl/nginx.key
  nginx_ssl_cert:
    file: ./deployment/nginx/ssl/nginx.crt
