version: '3.8'

services:
  # ============================================================================
  # DATABASE SERVICES
  # ============================================================================
  
  postgres:
    image: postgres:15-alpine
    container_name: twisterlab-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: twisterlab_staging
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-staging_secure_password_change_me}
      POSTGRES_DB: twisterlab_staging
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Different port for staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twisterlab_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - twisterlab-staging

  redis:
    image: redis:7-alpine
    container_name: twisterlab-redis-staging
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-staging_redis_password}
    volumes:
      - redis_staging_data:/data
    ports:
      - "6380:6379"  # Different port for staging
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - twisterlab-staging

  # ============================================================================
  # TWISTERLAB API SERVICE
  # ============================================================================
  
  api:
    image: twisterlab-api:staging
    container_name: twisterlab-api-staging
    restart: unless-stopped
    environment:
      # Environment
      ENVIRONMENT: staging
      DEBUG: "false"
      LOG_LEVEL: INFO
      
      # Database
      DATABASE_URL: postgresql+asyncpg://twisterlab_staging:${POSTGRES_PASSWORD:-staging_secure_password_change_me}@postgres:5432/twisterlab_staging
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-staging_redis_password}@redis:6379/0
      
      # Ollama
      OLLAMA_BASE_URL: http://ollama:11434
      
      # API Configuration
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_WORKERS: 2
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-staging_secret_key_please_change_in_production}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080,http://openwebui:8080
      
      # Monitoring
      ENABLE_METRICS: "true"
      METRICS_PORT: 9090
    ports:
      - "8001:8000"  # Different port for staging
      - "9091:9090"  # Metrics port
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs
    networks:
      - twisterlab-staging

  # ============================================================================
  # OLLAMA LLM SERVICE
  # ============================================================================
  
  ollama:
    image: ollama/ollama:latest
    container_name: twisterlab-ollama-staging
    restart: unless-stopped
    ports:
      - "11435:11434"  # Different port for staging
    volumes:
      - ollama_staging_data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_NUM_PARALLEL: 2
      OLLAMA_MAX_LOADED_MODELS: 3
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - twisterlab-staging
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ============================================================================
  # MONITORING SERVICES
  # ============================================================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: twisterlab-prometheus-staging
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9092:9090"  # Different port for staging
    volumes:
      - ./monitoring/prometheus.staging.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_staging_data:/prometheus
    networks:
      - twisterlab-staging
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: twisterlab-grafana-staging
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-staging_grafana_password}
      GF_SERVER_ROOT_URL: http://localhost:3003
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3003:3000"  # Different port for staging
    volumes:
      - grafana_staging_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - twisterlab-staging
    depends_on:
      - prometheus

  # ============================================================================
  # OPENWEBUI (OPTIONAL - FRONTEND)
  # ============================================================================
  
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: twisterlab-openwebui-staging
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OPENAI_API_BASE_URL: http://api:8000/v1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-staging_dummy_key}
    ports:
      - "8081:8080"  # Different port for staging
    volumes:
      - openwebui_staging_data:/app/backend/data
    networks:
      - twisterlab-staging
    depends_on:
      - api
      - ollama

volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local
  ollama_staging_data:
    driver: local
  prometheus_staging_data:
    driver: local
  grafana_staging_data:
    driver: local
  openwebui_staging_data:
    driver: local

networks:
  twisterlab-staging:
    driver: bridge
    name: twisterlab-staging-network
