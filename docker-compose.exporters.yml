version: '3.8'

secrets:
  redis_password:
    external: true
  postgres_password:
    external: true

networks:
  twisterlab_prod:
    external: true

services:
  redis-exporter:
    image: oliver006/redis_exporter:latest
    command:
      - --redis.addr=192.168.0.30:6379
      - --redis.password-file=/run/secrets/redis_password
    networks:
      - twisterlab_prod
    ports:
      - "9121:9121"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    secrets:
      - redis_password

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://twisterlab:$(cat /run/secrets/postgres_password)@twisterlab_postgres:5432/twisterlab?sslmode=disable"
    networks:
      - twisterlab_prod
    ports:
      - "9187:9187"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    secrets:
      - postgres_password
