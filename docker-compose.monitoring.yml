version: '3.8'

secrets:
  grafana_admin_password:
    external: true
  smtp_password:
    external: true

services:
  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"  # Changed from 9090 to avoid conflict with Traefik metrics
    # Use Docker configs for cross-node-safe configuration (stack deploy)
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus_rules_twisterlab
        target: /etc/prometheus/rules/twisterlab-alerts.yml
      - source: prometheus_rules_twisterlab2
        target: /etc/prometheus/rules/twisterlab.yml
    volumes:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - twisterlab_prod
      - traefik-net
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prometheus.rule=Host(`prometheus.twisterlab.local`)"
        - "traefik.http.routers.prometheus.entrypoints=web"
        - "traefik.http.routers.prometheus.service=prometheus"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  # Grafana - Dashboards & Visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    configs:
      - source: grafana_ini
        target: /etc/grafana/grafana.ini
      - source: grafana_provisioning_dashboards
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
      - source: grafana_dashboard_twisterlab
        target: /var/lib/grafana/dashboards/twisterlab-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - twisterlab_prod
      - traefik-net
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.twisterlab.local`)"
        - "traefik.http.routers.grafana.entrypoints=web"
        - "traefik.http.routers.grafana.service=grafana"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    depends_on:
      - prometheus
    secrets:
      - grafana_admin_password

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Accept jaeger.thrift over HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - twisterlab_prod
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      labels:
        - "traefik.enable=false"

  # Alertmanager - Alert Management
  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    configs:
      - source: alertmanager_config
        target: /etc/alertmanager/alertmanager.yml
    volumes:
      - alertmanager_data:/alertmanager
    networks:
      - twisterlab_prod
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      labels:
        - "traefik.enable=false"
    secrets:
      - smtp_password

volumes:
  prometheus_data:
    external: true
  grafana_data:
    external: true
  alertmanager_data:
    external: true

networks:
  twisterlab_prod:
    external: true
  traefik-net:
    external: true

configs:
  prometheus_config:
    file: ./monitoring/prometheus/config/prometheus.yml
  prometheus_rules_twisterlab:
    file: ./monitoring/prometheus/rules/twisterlab-alerts.yml
  prometheus_rules_twisterlab2:
    file: ./monitoring/prometheus/rules/twisterlab.yml
  grafana_ini:
    file: ./monitoring/grafana/config/grafana.ini
  grafana_provisioning_dashboards:
    file: ./monitoring/grafana/provisioning/dashboards/dashboards.yml
  grafana_dashboard_twisterlab:
    file: ./monitoring/grafana/dashboards/twisterlab-overview.json
  alertmanager_config:
    file: ./monitoring/alertmanager/config/alertmanager.yml
