version: '3.8'

services:
  # Node Exporter - System metrics (simple standalone)
  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    ports:
      - "9100:9100"
    networks:
      - twisterlab_prod
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

networks:
  twisterlab_prod:
    external: true
