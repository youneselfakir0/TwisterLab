version: '3.8'

services:
  # PostgreSQL Database - Production
  postgres:
    image: postgres:16-alpine
    container_name: twisterlab-postgres-prod
    env_file:
      - .env.prod
    secrets:
      - postgres_password
    ports:
      - "127.0.0.1:5432:5432"  # Only expose locally
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./deployment/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - twisterlab_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Redis Cache & State - Production
  redis:
    image: redis:7-alpine
    container_name: twisterlab-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env.prod
    secrets:
      - redis_password
    ports:
      - "127.0.0.1:6379:6379"  # Only expose locally
    volumes:
      - redis_prod_data:/data
    networks:
      - twisterlab_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Ollama for Local AI Inference - Production
  ollama:
    image: ollama/ollama:latest
    container_name: twisterlab-ollama-prod
    ports:
      - "127.0.0.1:11434:11434"  # Only expose locally
    volumes:
      - ollama_prod_data:/root/.ollama
    networks:
      - twisterlab_prod
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  # OpenWebUI Interface - Production
  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: twisterlab-webui-prod
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-your-webui-secret}
    volumes:
      - webui_prod_data:/app/backend/data
    ports:
      - "127.0.0.1:3000:8080"  # Only expose locally
    networks:
      - twisterlab_prod
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # TwisterLab API Server - Production
  api:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.prod
    container_name: twisterlab-api-prod
    env_file:
      - .env.prod
    environment:
      - ENVIRONMENT=production
    ports:
      - "127.0.0.1:8000:8000"  # Only expose locally
    volumes:
      - ./logs:/app/logs
    networks:
      - twisterlab_prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

  # Nginx Reverse Proxy - Production
  nginx:
    image: nginx:alpine
    container_name: twisterlab-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - twisterlab_prod
    depends_on:
      - api
      - webui
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot:latest
    container_name: twisterlab-certbot
    volumes:
      - ./deployment/nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/lib/letsencrypt
    networks:
      - twisterlab_prod
    command: certonly --webroot --webroot-path=/var/www/html --email ${ADMIN_EMAIL} --agree-tos --no-eff-email -d ${DOMAIN_NAME}
    profiles:
      - certbot

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt

volumes:
  postgres_prod_data:
  redis_prod_data:
  ollama_prod_data:
  webui_prod_data:
  nginx_logs:
  certbot_data:

networks:
  twisterlab_prod:
    driver: bridge