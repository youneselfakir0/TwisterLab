version: '3.8'

services:
  # Traefik Load Balancer
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.watch=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - twisterlab_prod
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      labels:
        - "traefik.enable=false"

  # PostgreSQL Database - Temporairement sans volume
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: twisterlab_prod
      POSTGRES_USER: twisterlab
      POSTGRES_PASSWORD: TwisterLab2024!
    ports:
      - "5432:5432"
    # volumes:
    #   - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - twisterlab_prod
    deploy:
      labels:
        - "traefik.enable=false"
      placement:
        constraints:
          - node.labels.os == linux

  # Redis Cache & Messaging
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - twisterlab_prod
    deploy:
      labels:
        - "traefik.enable=false"
      placement:
        constraints:
          - node.labels.os == linux

  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - twisterlab_prod
    deploy:
      # placement:
      #   constraints:
      #     - node.labels.os == linux
      labels:
        - "traefik.enable=false"
    environment:
      - OLLAMA_HOST=0.0.0.0
    command: serve

  # MCP Server - Temporairement désactivé pour déploiement
  # mcp_server:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.mcp
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - MCP_CONFIG_PATH=/app/config/mcp.json
  #     - OLLAMA_URL=http://ollama:11434
  #   volumes:
  #     - ./agents/mcp:/app/agents/mcp:ro
  #   networks:
  #     - twisterlab_prod
  #   deploy:
  #     placement:
  #       constraints:
  #         - node.labels.os == linux
  #     labels:
  #       - "traefik.enable=false"
  #   depends_on:
  #     - ollama

  # TwisterLab API - Temporairement simplifié
  api:
    image: python:3.10-slim
    command: ["sh", "-c", "pip install fastapi uvicorn && python -c \"import uvicorn; from fastapi import FastAPI; app = FastAPI(); app.get('/health')(lambda: {'status': 'ok'}); app.get('/api/health')(lambda: {'status': 'ok', 'path': '/api/health'}); uvicorn.run(app, host='0.0.0.0', port=8000)\""]
    ports:
      - "8000:8000"
    networks:
      - twisterlab_prod
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
        - "traefik.http.routers.api.entrypoints=web"
        - "traefik.http.services.api.loadbalancer.server.port=8000"
        # - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
        # - "traefik.http.routers.api.middlewares=api-strip"
    depends_on:
      - postgres
      - redis
      - ollama

  # OpenWebUI Interface
  webui:
    image: ghcr.io/open-webui/open-webui:main
    volumes:
      - webui_prod_data:/app/backend/data
    networks:
      - twisterlab_prod
    deploy:
      placement:
        constraints:
          - node.labels.os == linux
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.webui.rule=Host(`webui.twisterlab.local`)"
        - "traefik.http.routers.webui.entrypoints=web"
        - "traefik.http.services.webui.loadbalancer.server.port=8080"
    depends_on:
      - api

volumes:
  redis_prod_data:
    external: true
  webui_prod_data:
    external: true
  postgres_prod_data:
    external: true
  ollama_data:
    external: true

networks:
  twisterlab_prod:
    external: true
