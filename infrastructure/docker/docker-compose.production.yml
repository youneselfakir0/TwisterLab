# TwisterLab Production Deployment
# Clean deployment with image building
version: '3.8'

x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT:-production}
  DATABASE_URL: postgresql://${POSTGRES_USER:-twisterlab}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-twisterlab_prod}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
  SECRET_KEY: ${SECRET_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-healthcheck-postgres: &healthcheck-postgres
  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twisterlab}"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

x-healthcheck-redis: &healthcheck-redis
  test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik.address=:8080"
      - "--metrics.prometheus=true"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-twisterlab_prod}
      POSTGRES_USER: ${POSTGRES_USER:-twisterlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck: *healthcheck-postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck: *healthcheck-redis
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:latest
    command:
      - --redis.addr=redis:6379
      - --redis.password=${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    logging: *default-logging

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    logging: *default-logging

  api:
    build:
      context: ../..
      dockerfile: infrastructure/dockerfiles/Dockerfile.api
    image: twisterlab-api:production
    environment:
      <<: *common-env
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_REDIRECT_URI: ${AZURE_REDIRECT_URI:-http://192.168.0.30:8000/auth/callback}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8000:8000"
    networks:
      - backend
      - traefik-public
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`api.twisterlab.local`)"
        - "traefik.http.routers.api.entrypoints=web"
        - "traefik.http.services.api.loadbalancer.server.port=8000"
    logging: *default-logging

  webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "8083:8080"
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_NAME=TwisterLab AI Assistant
      - WEBUI_AUTH=False
    volumes:
      - webui_data:/app/backend/data
    networks:
      - backend
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging: *default-logging

networks:
  backend:
    driver: overlay
  traefik-public:
    driver: overlay

volumes:
  postgres_data:
  redis_data:
  webui_data:
