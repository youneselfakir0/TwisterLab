version: '3.8'

services:
  # Docker Registry (local repository for images)
  registry:
    image: registry:2
    container_name: twisterlab_registry
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
      - ./registry-config.yml:/etc/docker/registry/config.yml:ro
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_ADDR: "0.0.0.0:5000"
    networks:
      - registry_network
    labels:
      - "com.twisterlab.service=registry"
      - "com.twisterlab.component=infrastructure"

  # Registry UI (web interface for managing images)
  registry-ui:
    image: joxit/docker-registry-ui:2.5.0
    container_name: twisterlab_registry_ui
    restart: always
    ports:
      - "5001:80"
    environment:
      SINGLE_REGISTRY: "true"
      REGISTRY_TITLE: "TwisterLab Registry"
      REGISTRY_URL: "http://registry:5000"
      DELETE_IMAGES: "true"
      SHOW_CONTENT_DIGEST: "true"
      NGINX_PROXY_PASS_URL: "http://registry:5000"
      SHOW_CATALOG_NB_TAGS: "true"
      CATALOG_MIN_BRANCHES: "1"
      CATALOG_MAX_BRANCHES: "1"
      TAGLIST_PAGE_SIZE: "100"
      REGISTRY_SECURED: "false"
    depends_on:
      - registry
    networks:
      - registry_network
    labels:
      - "com.twisterlab.service=registry-ui"
      - "com.twisterlab.component=infrastructure"

networks:
  registry_network:
    driver: bridge

volumes:
  registry_data:
    driver: local
