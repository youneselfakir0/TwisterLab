version: '3.8'

# =============================================================================
# TWISTERLAB UNIFIED DOCKER COMPOSE
# Version: 1.0.0
# Date: 2025-11-10
#
# UN SEUL fichier pour staging ET production
# Utilise .env.staging OU .env.production pour différencier
# =============================================================================

# Variables communes réutilisables
x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT:-production}
  DATABASE_URL: postgresql://${POSTGRES_USER:-twisterlab}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-twisterlab_prod}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
  SECRET_KEY: ${SECRET_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

# Healthcheck réutilisable pour l'API
x-healthcheck-api: &healthcheck-api
  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

# Healthcheck pour PostgreSQL
x-healthcheck-postgres: &healthcheck-postgres
  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twisterlab}"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

# Healthcheck pour Redis
x-healthcheck-redis: &healthcheck-redis
  test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

# Logging configuration commune
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ===========================================================================
  # TRAEFIK - Load Balancer & Reverse Proxy
  # ===========================================================================
  traefik:
    image: traefik:v2.10
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik.address=:8080"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN:-twisterlab.local}`)"
        - "traefik.http.routers.traefik.service=api@internal"
        - "traefik.http.routers.traefik.entrypoints=web"
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"
    logging: *default-logging

  # ===========================================================================
  # POSTGRESQL - Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-twisterlab_prod}
      POSTGRES_USER: ${POSTGRES_USER:-twisterlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck: *healthcheck-postgres
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      labels:
        - "traefik.enable=false"
    logging: *default-logging

  # ===========================================================================
  # REDIS - Cache & Session Store
  # ===========================================================================
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "twisterlab_prod_redis_password_2024!"
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck: *healthcheck-redis
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
      labels:
        - "traefik.enable=false"
    logging: *default-logging

  # ===========================================================================
  # REDIS EXPORTER - Prometheus Metrics for Redis
  # ===========================================================================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    command:
      - --redis.addr=redis:6379
      - --redis.password=twisterlab_prod_redis_password_2024!
    ports:
      - "9121:9121"
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
      labels:
        - "traefik.enable=false"
        - "prometheus.scrape=true"
        - "prometheus.port=9121"
    logging: *default-logging

  # ===========================================================================
  # POSTGRES EXPORTER - Prometheus Metrics for PostgreSQL
  # ===========================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      - DATA_SOURCE_NAME=postgresql://twisterlab:twisterlab_prod_db_password_2024%21@postgres:5432/twisterlab_prod?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
      labels:
        - "traefik.enable=false"
        - "prometheus.scrape=true"
        - "prometheus.port=9187"
    logging: *default-logging

  # ===========================================================================
  # TWISTERLAB API - Autonomous Agents Core
  # ===========================================================================
  api:
    image: twisterlab-api:latest
    environment:
      <<: *common-env
      # Hybrid Authentication (Azure AD + Local fallback)
      # Azure AD credentials (optional - if not set, uses local auth)
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_REDIRECT_URI: ${AZURE_REDIRECT_URI:-http://192.168.0.30:8000/auth/callback}
      # Local JWT authentication (always available as fallback)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme_admin_2024!}
      # Redis connection for session management
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8000:8000"
    networks:
      - backend
      - traefik-public
    depends_on:
      - postgres
      - redis
    # Healthcheck désactivé temporairement (curl non installé dans l'image)
    # healthcheck: *healthcheck-api
    deploy:
      replicas: ${API_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`api.${DOMAIN:-twisterlab.local}`)"
        - "traefik.http.routers.api.entrypoints=web"
        - "traefik.http.services.api.loadbalancer.server.port=8000"
        - "traefik.http.services.api.loadbalancer.healthcheck.path=/health"
        - "traefik.http.services.api.loadbalancer.healthcheck.interval=10s"
    logging: *default-logging

  # ===========================================================================
  # OPEN WEBUI - AI Assistant Interface
  # ===========================================================================
  webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "${WEBUI_PORT:-8083}:8080"
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_NAME=TwisterLab AI Assistant
      - WEBUI_AUTH=False
      - WEBUI_DEFAULT_USER_ROLE=user
      - WEBUI_ENABLE_SIGNUP=False
    volumes:
      - webui_data:/app/backend/data
    networks:
      - backend
      - traefik-public
    depends_on:
      - ollama
    # Healthcheck désactivé (le téléchargement du modèle embedding prend trop de temps)
    healthcheck:
      disable: true
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.webui.rule=Host(`webui.${DOMAIN:-twisterlab.local}`)"
        - "traefik.http.routers.webui.entrypoints=web"
        - "traefik.http.services.webui.loadbalancer.server.port=8080"
    logging: *default-logging

# =============================================================================
# VOLUMES - Persistent Data Storage
# =============================================================================
volumes:
  postgres_data:
    driver: local

  redis_data:
    driver: local

  webui_data:
    driver: local

# =============================================================================
# NETWORKS - Container Communication
# =============================================================================
networks:
  backend:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"

  traefik-public:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"
