version: '3.8'

# =============================================================================
# TWISTERLAB UNIFIED DOCKER COMPOSE
# Version: 1.0.0
# Date: 2025-11-10
#
# UN SEUL fichier pour staging ET production
# Utilise .env.staging OU .env.production pour différencier
# =============================================================================

# Variables communes réutilisables
x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT:-production}
  DATABASE_URL: postgresql://${POSTGRES_USER:-twisterlab}@postgres:5432/${POSTGRES_DB:-twisterlab_prod}
  DATABASE_URL__FILE: /run/secrets/postgres_password
  REDIS_URL: redis://:@redis:6379
  REDIS_PASSWORD_FILE: /run/secrets/redis_password
  SECRET_KEY: ${SECRET_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

# Healthcheck réutilisable pour l'API
x-healthcheck-api: &healthcheck-api
  test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

# Healthcheck pour PostgreSQL
x-healthcheck-postgres: &healthcheck-postgres
  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twisterlab}"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

# Healthcheck pour Redis
x-healthcheck-redis: &healthcheck-redis
  test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

# Logging configuration commune
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ===========================================================================
  # TRAEFIK - Load Balancer & Reverse Proxy
  # ===========================================================================
  traefik:
    image: traefik:v2.10
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.swarmMode=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik.address=:8080"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--accesslog=true"
      # Let's Encrypt ACME (for production domains)
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@twisterlab.local"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      # Self-signed certificates for local development
      - "--certificatesresolvers.selfsigned.acme.tlschallenge=true"
      - "--certificatesresolvers.selfsigned.acme.email=admin@twisterlab.local"
      - "--certificatesresolvers.selfsigned.acme.storage=/letsencrypt/selfsigned.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN:-twisterlab.local}`)"
        - "traefik.http.routers.traefik.service=api@internal"
        - "traefik.http.routers.traefik.entrypoints=web"
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"
    logging: *default-logging

  # ===========================================================================
  # POSTGRESQL - Database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-twisterlab_prod}
      POSTGRES_USER: ${POSTGRES_USER:-twisterlab}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
      # PostgreSQL Memory Optimization (2GB container limit)
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_SHARED_BUFFERS: 512MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 128MB
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
      POSTGRES_WAL_BUFFERS: 16MB
      POSTGRES_DEFAULT_STATISTICS_TARGET: 100
      # Disable huge pages to prevent memory issues
      POSTGRES_HUGE_PAGES: off
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - backend
    healthcheck: *healthcheck-postgres
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      labels:
        - "traefik.enable=false"
    logging: *default-logging

  # ===========================================================================
  # REDIS - Cache & Session Store
  # ===========================================================================
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - /run/secrets/redis_password
      - --maxmemory
      - "512mb"
      - --maxmemory-policy
      - allkeys-lru
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck: *healthcheck-redis
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
      labels:
        - "traefik.enable=false"
    logging: *default-logging

  # ===========================================================================
  # REDIS EXPORTER - Prometheus Metrics for Redis
  # ===========================================================================
  redis-exporter:
    image: oliver006/redis_exporter:v1.54.0
    command:
      - --redis.addr=redis:6379
      - --redis.password-file=/run/secrets/redis_password
    secrets:
      - redis_password
    ports:
      - "9121:9121"
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
      labels:
        - "traefik.enable=false"
        - "prometheus.scrape=true"
        - "prometheus.port=9121"
    logging: *default-logging

  # ===========================================================================
  # POSTGRES EXPORTER - Prometheus Metrics for PostgreSQL
  # ===========================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      - DATA_SOURCE_NAME=postgresql://twisterlab@postgres:5432/twisterlab_prod?sslmode=disable
      - PGPASSWORD_FILE=/run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "9187:9187"
    networks:
      - backend
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
      labels:
        - "traefik.enable=false"
        - "prometheus.scrape=true"
        - "prometheus.port=9187"
    logging: *default-logging

  # ===========================================================================
  # TWISTERLAB API - Autonomous Agents Core
  # ===========================================================================
  api:
    image: twisterlab-api:production
    environment:
      <<: *common-env
      # Hybrid Authentication (Azure AD + Local fallback)
      # Azure AD credentials (optional - if not set, uses local auth)
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_REDIRECT_URI: ${AZURE_REDIRECT_URI:-http://192.168.0.30:8000/auth/callback}
      # Local JWT authentication (always available as fallback)
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme_admin_2024!}
      # Redis connection for session management
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    ports:
      - "8000:8000"
    networks:
      - backend
      - traefik-public
    depends_on:
      - postgres
      - redis
    # Healthcheck désactivé temporairement (curl non installé dans l'image)
    # healthcheck: *healthcheck-api
    deploy:
      replicas: ${API_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`api.${DOMAIN:-twisterlab.local}`) || Host(`192.168.0.30`)"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.routers.api.tls.certresolver=selfsigned"
        - "traefik.http.services.api.loadbalancer.server.port=8000"
        # Redirect HTTP to HTTPS
        - "traefik.http.routers.api-http.rule=Host(`api.${DOMAIN:-twisterlab.local}`) || Host(`192.168.0.30`)"
        - "traefik.http.routers.api-http.entrypoints=web"
        - "traefik.http.routers.api-http.middlewares=redirect-to-https"
        - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
        # Temporarily disable health checks
        # - "traefik.http.services.api.loadbalancer.healthcheck.path=/health"
        # - "traefik.http.services.api.loadbalancer.healthcheck.interval=10s"
    logging: *default-logging

  # ===========================================================================
  # OPEN WEBUI - AI Assistant Interface
  # ===========================================================================
  webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "${WEBUI_PORT:-8083}:8080"
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_NAME=TwisterLab AI Assistant
      - WEBUI_AUTH=False
      - WEBUI_DEFAULT_USER_ROLE=user
      - WEBUI_ENABLE_SIGNUP=False
    volumes:
      - webui_data:/app/backend/data
    networks:
      - backend
      - traefik-public
    depends_on:
      - ollama
    # Healthcheck désactivé (le téléchargement du modèle embedding prend trop de temps)
    healthcheck:
      disable: true
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.webui.rule=Host(`webui.${DOMAIN:-twisterlab.local}`)"
        - "traefik.http.routers.webui.entrypoints=web"
        - "traefik.http.services.webui.loadbalancer.server.port=8080"
    logging: *default-logging

  # ===========================================================================
  # OLLAMA - Local LLM Inference (GPU-Accelerated on CoreRTX)
  # ===========================================================================
  ollama:
    image: ollama/ollama:0.1.44
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    deploy:
      placement:
        constraints:
          - node.hostname == corertx
      replicas: 1
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=false"
    logging: *default-logging

  # ===========================================================================
  # PROMETHEUS - Metrics Collection & Time Series Database
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN:-twisterlab.local}`)"
        - "traefik.http.routers.prometheus.entrypoints=web"
        - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
    logging: *default-logging

  # ===========================================================================
  # GRAFANA - Monitoring Dashboard & Visualization
  # ===========================================================================
  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://grafana.${DOMAIN:-twisterlab.local}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=redis-datasource
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend
      - traefik-public
    depends_on:
      - prometheus
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN:-twisterlab.local}`)"
        - "traefik.http.routers.grafana.entrypoints=web"
        - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    logging: *default-logging

  # ===========================================================================
  # NODE-EXPORTER - System Metrics (CPU, RAM, Disk, Network)
  # ===========================================================================
  node-exporter:
    image: prom/node-exporter:v1.6.1
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - backend
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    deploy:
      mode: global
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
      restart_policy:
        condition: on-failure
      labels:
        - "prometheus.scrape=true"
        - "prometheus.port=9100"
    logging: *default-logging

# =============================================================================
# NETWORKS - Docker Networks Configuration
# =============================================================================
networks:
  backend:
    driver: overlay
    attachable: true
  traefik-public:
    driver: overlay
    attachable: true

# =============================================================================
# VOLUMES - Persistent Data Storage
# =============================================================================
volumes:
  postgres_data:
    driver: local

  redis_data:
    driver: local

  webui_data:
    driver: local

  letsencrypt_data:
    driver: local

  ollama_data:
    driver: local

  prometheus_data:
    driver: local

  grafana_data:
    driver: local

# =============================================================================
# SECRETS - Docker Swarm Secrets for Secure Password Management
# =============================================================================
secrets:
  postgres_password:
    external: true
  redis_password:
    external: true
  grafana_admin_password:
    external: true
