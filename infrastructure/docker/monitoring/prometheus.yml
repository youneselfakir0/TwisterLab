# =============================================================================
# PROMETHEUS CONFIGURATION - TwisterLab Monitoring
# Version: 1.0.0
# Date: 2025-11-15
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'twisterlab'
    environment: 'production'

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  # - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # =============================================================================
  # PROMETHEUS SELF-MONITORING
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # =============================================================================
  # NODE EXPORTER - System Metrics (CPU, RAM, Disk, Network)
  # =============================================================================
  - job_name: 'node-exporter'
    dns_sd_configs:
      - names:
          - 'tasks.node-exporter'
        type: 'A'
        port: 9100
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(:[0-9]+)?'
        replacement: '${1}'

  # =============================================================================
  # REDIS EXPORTER - Redis Cache Metrics
  # =============================================================================
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  # =============================================================================
  # POSTGRES EXPORTER - Database Metrics
  # =============================================================================
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'

  # =============================================================================
  # TRAEFIK - Load Balancer Metrics
  # =============================================================================
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
        labels:
          service: 'traefik'

  # =============================================================================
  # TWISTERLAB API - Application Metrics
  # =============================================================================
  - job_name: 'twisterlab-api'
    dns_sd_configs:
      - names:
          - 'tasks.api'
        type: 'A'
        port: 8000
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+)(:[0-9]+)?'
        replacement: '${1}'

  # =============================================================================
  # DOCKER SWARM - Container & Service Metrics (via cAdvisor if deployed)
  # =============================================================================
  # - job_name: 'cadvisor'
  #   dns_sd_configs:
  #     - names:
  #         - 'tasks.cadvisor'
  #       type: 'A'
  #       port: 8080
