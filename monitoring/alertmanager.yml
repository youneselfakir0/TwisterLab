global:
  smtp_smarthost: 'smtp.twisterlab.local:587'
  smtp_from: 'alerts@twisterlab.local'
  smtp_auth_username: 'alerts@twisterlab.local'
  smtp_auth_password_file: /run/secrets/smtp_password

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'twisterlab-alerts'
  routes:
    - match:
        severity: critical
      receiver: 'twisterlab-critical'
      continue: true
    - match:
        service: backup
      receiver: 'twisterlab-backup'
      continue: true

receivers:
  - name: 'twisterlab-alerts'
    email_configs:
      - to: 'admin@twisterlab.local'
        subject: 'TwisterLab Alert: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Service: {{ .Labels.service }}
          Started: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  - name: 'twisterlab-critical'
    email_configs:
      - to: 'critical-alerts@twisterlab.local'
        subject: '🚨 CRITICAL: TwisterLab {{ .GroupLabels.alertname }}'
        body: |
          🚨 CRITICAL ALERT 🚨

          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Started: {{ .StartsAt.Format "2006-01-02 15:04:05" }}

          This requires IMMEDIATE attention!
          {{ end }}

    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#twisterlab-critical'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          • {{ .Annotations.summary }}
          • {{ .Annotations.description }}
          {{ end }}

  - name: 'twisterlab-backup'
    email_configs:
      - to: 'backup-admin@twisterlab.local'
        subject: '💾 Backup Alert: {{ .GroupLabels.alertname }}'
        body: |
          Backup System Alert

          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Started: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
