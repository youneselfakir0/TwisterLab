global:
  smtp_smarthost: 'localhost:1025'
  smtp_from: 'alerts@twisterlab.local'
  smtp_require_tls: false

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'email'
  routes:
  - match:
      severity: critical
    receiver: 'critical-email'
  - match:
      severity: warning
    receiver: 'warning-email'

receivers:
- name: 'email'
  email_configs:
  - to: 'admin@twisterlab.local'
    send_resolved: true

- name: 'critical-email'
  email_configs:
  - to: 'admin@twisterlab.local,critical@twisterlab.local'
    send_resolved: true

- name: 'warning-email'
  email_configs:
  - to: 'admin@twisterlab.local'
    send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']