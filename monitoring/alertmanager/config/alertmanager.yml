global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@twisterlab.local'
  smtp_auth_username: ''
  smtp_auth_password: ''

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'email-notifications'
  routes:
  - match:
      alertname: TwisterLabDown
    receiver: 'email-notifications'
    group_wait: 10s
    repeat_interval: 30s

receivers:
- name: 'email-notifications'
  email_configs:
  - to: 'admin@twisterlab.local'
    send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']
