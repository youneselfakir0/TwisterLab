[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[server]
http_port = 3000
domain = localhost

[security]
admin_user = admin
admin_password = twisterlab

[users]
allow_sign_up = false

[auth.anonymous]
enabled = true
org_role = Viewer

[log]
mode = console
level = info

[metrics]
enabled = true

[unified_alerting]
enabled = true