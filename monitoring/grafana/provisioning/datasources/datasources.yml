apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    user: twisterlab
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-}
    jsonData:
      database: twisterlab
      sslmode: disable
    editable: true

  - name: Redis
    type: redis-datasource
    access: proxy
    url: redis:6379
    editable: true

  - name: JSON API
    type: marcusolsson-json-datasource
    access: proxy
    url: http://localhost:3000
    editable: true
    jsonData:
      tlsSkipVerify: true