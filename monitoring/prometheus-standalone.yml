global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'twisterlab'
    environment: 'production'

scrape_configs:
  # Node Exporter (métriques système)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'edgeserver'
          
  # cAdvisor (métriques Docker)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['192.168.0.30:8080']
        labels:
          instance: 'edgeserver'
          
  # TwisterLab API
  - job_name: 'twisterlab-api'
    static_configs:
      - targets: ['192.168.0.30:8000']
        labels:
          service: 'api'
          
  # PostgreSQL Exporter
  - job_name: 'postgresql'
    static_configs:
      - targets: ['localhost:9187']
        labels:
          instance: 'edgeserver'
          service: 'postgresql'
          
  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
        labels:
          instance: 'edgeserver'
          service: 'redis'
