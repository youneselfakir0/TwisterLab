global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    cluster: twisterlab

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - /etc/prometheus/alerts/*.yml

# Scrape configurations
scrape_configs:
  # TwisterLab API metrics
  - job_name: 'twisterlab-api'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'api:9090'
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: twisterlab-api-prod

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'

  # PostgreSQL exporter (requires postgres_exporter sidecar)
  - job_name: 'postgres'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'postgres-exporter:9187'

  # Redis exporter (requires redis_exporter sidecar)
  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'redis-exporter:9121'

  # Node exporter for system metrics
  - job_name: 'node'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'node-exporter:9100'

  # Ollama LLM metrics
  - job_name: 'ollama'
    scrape_interval: 60s
    static_configs:
      - targets:
          - 'ollama:11434'
    metrics_path: /metrics

  # Nginx metrics (requires nginx-prometheus-exporter)
  - job_name: 'nginx'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'nginx-exporter:9113'
