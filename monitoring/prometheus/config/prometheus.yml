global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - System metrics
  - job_name: 'node'
    static_configs:
      - targets: ['192.168.0.30:9100']
    scrape_interval: 5s

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['10.0.0.220:9187']

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['10.0.0.218:9121']

  # cAdvisor - Docker containers metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 5s

  # Blackbox Exporter - HTTP endpoints
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://192.168.0.30:8000/health
        - http://192.168.0.30:8080/health
        - http://192.168.0.30:11434/api/tags
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: twisterlab-api-exporter:9115

  # TwisterLab API custom metrics
  - job_name: 'twisterlab-api'
    static_configs:
      - targets: ['192.168.0.30:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Ollama metrics (if available)
  - job_name: 'ollama'
    static_configs:
      - targets: ['192.168.0.30:11434']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['192.168.0.30:9100']
    scrape_interval: 15s
