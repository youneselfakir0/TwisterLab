global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']  # FIXED: Port correct

  - job_name: 'twisterlab-api'
    static_configs:
      - targets: ['192.168.0.30:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'traefik'
    static_configs:
      - targets: ['192.168.0.30:8080']  # FIXED: IP au lieu de DNS
    metrics_path: '/metrics'
    scrape_interval: 15s

  # System Monitoring via Traefik Metrics (zero conflicts, already active)
  - job_name: 'traefik-metrics'
    static_configs:
      - targets: ['192.168.0.30:8080']  # FIXED: IP au lieu de DNS
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Container Metrics (optional - requires deployment)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #   scrape_interval: 15s

  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8082']  # Port 8082 to avoid conflict with Traefik
  #   scrape_interval: 15s
  #   metrics_path: '/metrics'

  - job_name: 'twisterlab-redis'

    static_configs:
      - targets: ['192.168.0.30:9121']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'twisterlab-postgres'
    static_configs:
      - targets: ['192.168.0.30:9187']
    metrics_path: '/metrics'
    scrape_interval: 15s
