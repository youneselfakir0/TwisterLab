global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'twisterlab-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'twisterlab-redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'twisterlab-postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'twisterlab-ollama'
    static_configs:
      - targets: ['ollama:11434']

  - job_name: 'twisterlab-webui'
    static_configs:
      - targets: ['webui:8080']

  - job_name: 'twisterlab-rocketchat'
    static_configs:
      - targets: ['rocketchat:3000']

  - job_name: 'twisterlab-mongodb'
    static_configs:
      - targets: ['mongodb:27017']