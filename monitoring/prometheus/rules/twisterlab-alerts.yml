groups:
  - name: twisterlab-alerts
    rules:
      # ==================== API Availability Alerts ====================
      - alert: TwisterLabAPIDown
        expr: up{job="twisterlab-api"} == 0
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "TwisterLab API is down"
          description: "TwisterLab API has been down for more than 5 minutes."

      - alert: TwisterLabAPIHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="twisterlab-api"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "TwisterLab API high response time"
          description: "TwisterLab API 95th percentile response time is above 2 seconds for 5 minutes (current: {{ $value }}s)."

      # ==================== Agent Alerts (NEW) ====================
      - alert: TwisterLabAgentOperationErrors
        expr: rate(agent_operations_total{status="error"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          component: agents
        annotations:
          summary: "TwisterLab agent operations failing"
          description: "Agent {{ $labels.agent }} operation {{ $labels.operation }} has error rate > 0.1/sec (current: {{ $value }})."

      - alert: TwisterLabAgentSlowExecution
        expr: histogram_quantile(0.95, rate(agent_execution_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          component: agents
        annotations:
          summary: "TwisterLab agent slow execution"
          description: "Agent {{ $labels.agent }} operation {{ $labels.operation }} P95 execution time > 5s (current: {{ $value }}s)."

      - alert: TwisterLabInactiveAgents
        expr: active_agents_count < 7
        for: 2m
        labels:
          severity: critical
          component: agents
        annotations:
          summary: "TwisterLab agents not all active"
          description: "Expected 7 active agents, but only {{ $value }} are active."

      - alert: TwisterLabAgentExecutionFailed
        expr: rate(agent_execution_failures_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
          component: agents
        annotations:
          summary: "TwisterLab agent execution failed"
          description: "Agent execution failures detected in the last 5 minutes."

      # ==================== HTTP Metrics Alerts (NEW) ====================
      - alert: TwisterLabHighHTTPErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High HTTP error rate detected"
          description: "HTTP 5xx error rate is above 5% for endpoint {{ $labels.endpoint }} (current: {{ $value | humanizePercentage }})."

      - alert: TwisterLabHighHTTP4xxRate
        expr: rate(http_requests_total{status=~"4.."}[5m]) / rate(http_requests_total[5m]) > 0.15
        for: 10m
        labels:
          severity: info
          component: api
        annotations:
          summary: "High HTTP 4xx rate detected"
          description: "HTTP 4xx error rate is above 15% for endpoint {{ $labels.endpoint }} (current: {{ $value | humanizePercentage }})."

      # ==================== System Resource Alerts ====================
      - alert: TwisterLabHighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 90% for more than 5 minutes on {{ $labels.instance }} (current: {{ $value }}%)."

      - alert: TwisterLabHighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 90% for more than 5 minutes on {{ $labels.instance }} (current: {{ $value }}%)."

      # ==================== Database & Cache Alerts ====================
      - alert: TwisterLabRedisDown
        expr: up{job="twisterlab-redis"} == 0
        for: 2m
        labels:
          severity: critical
          component: cache
        annotations:
          summary: "Redis is down"
          description: "Redis cache has been down for more than 2 minutes."

      - alert: TwisterLabPostgresDown
        expr: up{job="twisterlab-postgres"} == 0
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database has been down for more than 2 minutes."

